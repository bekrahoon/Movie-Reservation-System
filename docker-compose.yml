services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      # store PG data in a subdirectory to avoid permission surprises
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data/pgdata
    networks:
      - app-network
    healthcheck:
      # check the specific database and user; give longer start period
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    build: .
    # Host port is configurable via HOST_PORT env var; default 8001 to avoid conflicts
    ports:
      - "${HOST_PORT:-8001}:8000"
    restart: always
    depends_on:
      db:
        condition: service_healthy # Wait for db to be healthy
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
    volumes:
      - .:/app
    networks:
      - app-network

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/sites-available/my_site.conf:/etc/nginx/sites-available/my_site.conf
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge

