<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cinema 4D — Telegram</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container { max-width: 400px; margin: 0 auto; text-align: center; }
        .spinner {
            display: inline-block;
            width: 32px; height: 32px;
            border: 3px solid rgba(0,0,0,.1);
            border-top-color: var(--tg-theme-button-color, #3390ec);
            border-radius: 50%;
            animation: spin .6s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Входим...</p>
    </div>

    <script>
        const tg = Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Шаг 1: пробуем войти по telegram_id (мгновенно, без запроса контакта)
        fetch('/telegram/auth/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({initData: tg.initData}),
        })
        .then(r => r.json())
        .then(data => {
            if (data.status === 'ok') {
                // telegram_id уже привязан — мгновенный вход
                window.location.href = '/';
            } else {
                // Первый раз — запрашиваем контакт
                requestPhone();
            }
        })
        .catch(() => {
            window.location.href = '/login/';
        });

        // Шаг 2: запрос контакта (только при первом входе)
        function requestPhone() {
            tg.requestContact(function(sent, event) {
                if (!sent) {
                    window.location.href = '/login/';
                    return;
                }

                let phone = '';
                if (event && event.responseUnsafe && event.responseUnsafe.contact) {
                    phone = event.responseUnsafe.contact.phone_number;
                }
                if (!phone) {
                    window.location.href = '/login/';
                    return;
                }
                if (!phone.startsWith('+')) {
                    phone = '+' + phone;
                }

                // Отправляем номер — бэкенд найдёт юзера и сохранит telegram_id
                fetch('/telegram/link/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({initData: tg.initData, phone: phone}),
                })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'ok') {
                        window.location.href = '/';
                    } else {
                        window.location.href = '/register/';
                    }
                })
                .catch(() => {
                    window.location.href = '/login/';
                });
            });
        }
    </script>
</body>
</html>
