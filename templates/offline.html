{% extends "index.html" %}

{% block content %}
<div class="text-center py-5">
    <h1 class="mb-3">Вы offline</h1>
    <p class="text-muted">
        Похоже, у вас нет подключения к интернету. Некоторые страницы и афиша,
        которые вы открывали ранее, всё ещё доступны из кэша.
    </p>
    <button class="btn btn-primary mt-3" onclick="window.location.reload()">
        Повторить попытку
    </button>
</div>
{% endblock content %}
