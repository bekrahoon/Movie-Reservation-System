{% load static %}
<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" type="text/css" href="{% static 'style.css' %}">
        <link rel="stylesheet" type="text/css" href="{% static 'css/auth.css' %}">

        <!-- PWA -->
        <link rel="manifest" href="{% static 'manifest.json' %}">
        <meta name="theme-color" content="#490000">
        <meta name="mobile-web-app-capable" content="yes">
        <link rel="icon" type="image/png" sizes="192x192" href="{% static 'img/icons/icon-192x192.png' %}">

        <!-- iOS "Add to Home Screen" support -->
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-title" content="Cinema 4D">
        <link rel="apple-touch-icon" href="{% static 'img/icons/apple-touch-icon.png' %}">

        <script src="https://js.stripe.com/v3/"></script>
        <script src="{% static 'js/register-sw.js' %}" defer></script>
        <title>Cinema 4D</title>
    </head>
    <body>
        {% include "navbar.html" %}

        <main class="py-4">
            <div class="container">
                {% block content %}{% endblock content %}
            </div>
        </main>

        {% block javascript %}{% endblock javascript %}

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
