{% load static %}
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
      <img src="{% static 'img/логотипы/Cinema-4D-Logo.png' %}" alt="Logo" height="40" class="me-2">
      <span class="fw-bold">CINEMA 4D</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Главная</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'about_us' %}">О нас</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'genres' %}">Жанры</a></li>
        {% if request.user.is_superuser %}
          <li class="nav-item"><a class="nav-link" href="{% url 'admin:index' %}">Admin</a></li>
        {% endif %}
      </ul>

      <form class="d-flex me-3" method="get" action="{% url 'search_movies' %}">
        <input class="form-control me-2" type="search" name="q" placeholder="Поиск фильмов..." aria-label="Search">
        <button class="btn btn-outline-primary" type="submit">Искать</button>
      </form>

      <div class="d-flex align-items-center">
        <a class="btn btn-outline-secondary me-2 d-none d-md-inline-flex" href="#">
          <img src="{% static 'img/call.png' %}" alt="call" height="18" class="me-2">+996 555 740 423
        </a>
        <a class="btn btn-outline-primary me-2" href="{% url 'cart' %}">Корзина</a>
        <a class="btn btn-outline-success me-2 d-none d-lg-inline" href="{% url 'booking_list' %}">Забронированные</a>

        {% if user.is_authenticated %}
          <form method="post" action="{% url 'logout' %}">{% csrf_token %}
            <button type="submit" class="btn btn-link">Выйти</button>
          </form>
        {% else %}
          <a class="btn btn-link me-2" href="{% url 'register' %}">Регистрация</a>
          <a class="btn btn-primary" href="{% url 'login' %}">Войти</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
