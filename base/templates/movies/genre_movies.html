{% extends "index.html" %}
{% load static %}
{% block content %}
  <div class="row">
    <div class="col-12 mb-4">
      <h2 class="h4">Фильмы жанра: <strong>{{ genre.name }}</strong></h2>
    </div>

    {% for movie in movies %}
      <div class="col-12 col-md-6 col-lg-4 mb-4">
        <div class="card h-100 shadow-sm">
          <a href="{% url 'movie_detail' movie.id %}">
            <img src="{{ movie.poster.url }}" class="card-img-top" alt="{{ movie.title }}">
          </a>
          <div class="card-body d-flex flex-column">
            <h5 class="card-title mb-2"><a href="{% url 'movie_detail' movie.id %}" class="text-decoration-none">{{ movie.title }}</a></h5>
            <p class="card-text small text-muted">{{ movie.description|truncatechars:120 }}</p>
            <p class="fw-semibold mt-auto mb-0">Стоимость: {{ movie.price }} $</p>
          </div>
        </div>
      </div>
    {% empty %}
      <div class="col-12">
        <div class="alert alert-info">Нет фильмов в этом жанре.</div>
      </div>
    {% endfor %}
  </div>
{% endblock %}
